services:
  tailscale-share:
    image: tailscale/tailscale:latest
    container_name: shost-tailscale-share
    hostname: ${TS_SHARE_HOSTNAME:-shost-share}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:?Set TS_AUTHKEY to a reusable or ephemeral Tailscale auth key}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_AUTH_ONCE=true
      - TS_USERSPACE=false
    volumes:
      - ./tailscale-share/state:/var/lib/tailscale
    devices:
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - NET_RAW
    restart: unless-stopped

  shost-share-proxy:
    image: nginx:alpine
    container_name: shost-share-proxy
    network_mode: service:tailscale-share
    depends_on:
      - tailscale-share
    volumes:
      - ./tailscale-share/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
