# Secret metadata inventory
# Values stay in env files or external stores. This file tracks scope, usage, and rotation policy.

secrets:
  - id: ha-token
    name: HA_LONG_LIVED_ACCESS_TOKEN
    type: token
    service: Home Assistant
    scope:
      - laptop
    targets:
      - yots
      - hosts
    source: homelab-dashboard/.env
    last_rotated: 2026-04-06
    rotation_policy_days: 180
    notes: Long-lived Home Assistant token used by Shost backend collectors.

  - id: mqtt-user
    name: MQTT_USERNAME
    type: credential
    service: Mosquitto
    scope:
      - laptop
    targets:
      - yots
      - laptop-exporter
    source: homelab-dashboard/.env
    last_rotated: 2026-04-06
    rotation_policy_days: 180

  - id: mqtt-password
    name: MQTT_PASSWORD
    type: password
    service: Mosquitto
    scope:
      - laptop
    targets:
      - yots
      - laptop-exporter
    source: homelab-dashboard/.env
    last_rotated: 2026-04-06
    rotation_policy_days: 180

  - id: cm4-shots-token
    name: CM4_SHOTS_RUNNER_TOKEN
    type: token
    service: CM4 Exporter
    scope:
      - laptop
      - cm4
    targets:
      - shots
    source: homelab-dashboard/.env
    last_rotated: 2026-04-05
    rotation_policy_days: 90

  - id: laptop-shots-token
    name: LAPTOP_SHOTS_RUNNER_TOKEN
    type: token
    service: Laptop Exporter
    scope:
      - laptop
    targets:
      - shots
    source: homelab-dashboard/.env
    last_rotated: 2026-04-05
    rotation_policy_days: 90

  - id: openrouter-key
    name: OPENROUTER_API_KEY
    type: api_key
    service: OpenRouter
    scope:
      - laptop
    targets:
      - settings
      - whopicked
    source: homelab-dashboard/.env
    last_rotated: 2026-04-06
    rotation_policy_days: 90

  - id: ntfy-auth
    name: NTFY_AUTH_TOKEN
    type: token
    service: ntfy
    scope:
      - cm4
      - laptop
    targets:
      - settings
      - notifications
    source: external
    last_rotated: 2026-03-01
    rotation_policy_days: 90
    notes: Metadata-only placeholder until centralized secret sync is implemented.
